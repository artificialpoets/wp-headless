services:
  db:
    image: mariadb:11.4
    container_name: wp-three-sites-db
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: rootpassword
      MARIADB_AUTO_UPGRADE: "1"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "127.0.0.1", "-prootpassword"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - db_data:/var/lib/mysql
      - ./mariadb/init:/docker-entrypoint-initdb.d:ro

  site1:
    image: wordpress:php8.3-apache
    container_name: wp-three-sites-site1
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "11001:80"
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: wp_site1
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress
      WORDPRESS_TABLE_PREFIX: wp_
      WORDPRESS_CONFIG_EXTRA: |
        define( 'WP_ENVIRONMENT_TYPE', 'local' );
        define( 'WP_DEBUG', true );
        define( 'WP_DEBUG_LOG', true );
        define( 'FS_METHOD', 'direct' );
    volumes:
      - site1_data:/var/www/html
      - ../../../:/workspace/wordpress-projects

  site2:
    image: wordpress:php8.3-apache
    container_name: wp-three-sites-site2
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "11002:80"
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: wp_site2
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress
      WORDPRESS_TABLE_PREFIX: wp_
      WORDPRESS_CONFIG_EXTRA: |
        define( 'WP_ENVIRONMENT_TYPE', 'local' );
        define( 'WP_DEBUG', true );
        define( 'WP_DEBUG_LOG', true );
        define( 'FS_METHOD', 'direct' );
    volumes:
      - site2_data:/var/www/html
      - ../../../:/workspace/wordpress-projects

  site3:
    image: wordpress:php8.3-apache
    container_name: wp-three-sites-site3
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "11003:80"
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: wp_site3
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress
      WORDPRESS_TABLE_PREFIX: wp_
      WORDPRESS_CONFIG_EXTRA: |
        define( 'WP_ENVIRONMENT_TYPE', 'local' );
        define( 'WP_DEBUG', true );
        define( 'WP_DEBUG_LOG', true );
        define( 'FS_METHOD', 'direct' );
    volumes:
      - site3_data:/var/www/html
      - ../../../:/workspace/wordpress-projects

  cli-site1:
    image: wordpress:cli-php8.3
    depends_on:
      db:
        condition: service_healthy
      site1:
        condition: service_started
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: wp_site1
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress
    volumes:
      - site1_data:/var/www/html
      - ../../../:/workspace/wordpress-projects

  cli-site2:
    image: wordpress:cli-php8.3
    depends_on:
      db:
        condition: service_healthy
      site2:
        condition: service_started
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: wp_site2
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress
    volumes:
      - site2_data:/var/www/html
      - ../../../:/workspace/wordpress-projects

  cli-site3:
    image: wordpress:cli-php8.3
    depends_on:
      db:
        condition: service_healthy
      site3:
        condition: service_started
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: wp_site3
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress
    volumes:
      - site3_data:/var/www/html
      - ../../../:/workspace/wordpress-projects

volumes:
  db_data:
  site1_data:
  site2_data:
  site3_data:
